version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pic-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pic
      POSTGRES_USER: pic
      POSTGRES_PASSWORD: pic_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pic -d pic"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pic-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pic:pic_secret@db:5432/pic
      JWT_SECRET: pic_jwt_secret_change_in_production
      NEXTAUTH_SECRET: pic_nextauth_secret_change_in_production
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: development

      # LDAP / Active Directory
      LDAP_URL: ${LDAP_URL:-ldap://ldap.empresa.com}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=empresa,dc=com}
      LDAP_BIND_USER: ${LDAP_BIND_USER:-cn=admin,dc=empresa,dc=com}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-senha}

      # IA
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # Email / SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.office365.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}

volumes:
  postgres_data:
    driver: local
